{% extends 'base.html' %}
{% load static %}

{% block title %}Reset Password - TailorPro{% endblock %}

{% block content %}
<section class="hero" style="min-height: 80vh; padding: 80px 0;">
    <div class="container">
        <div class="hero-content">
            <div class="hero-text" style="max-width: 500px; margin: 0 auto;">
                <h1>Create New <span>Password</span></h1>
                <p>Enter your new password below to complete the reset process.</p>

                <form class="auth-form" id="forgotForm" method="post" action="{% url 'accounts:reset_password' %}" enctype="multipart/form-data">
                    {% csrf_token %}
                    <input type="hidden" name="uidb64" value="{{ uidb64 }}">
                    <input type="hidden" name="token" value="{{ token }}">

                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <input class="form-input" type="password" id="password" name="password" placeholder="Enter new password" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input class="form-input" type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required />
                    </div>

                    <div class="form-actions">
                        <button class="btn btn-primary btn-large" type="submit" style="width: 100%;">
                            <i class="fas fa-redo"></i> Reset Password
                        </button>
                    </div>

                    <div id="msg" class="form-message"></div>
                </form>
            </div>
            <div class="hero-image">
                <div class="hero-image-placeholder">
                    <div style="text-align: center;">
                        <i class="fas fa-shield-alt" style="font-size: 80px; margin-bottom: 20px; color: var(--accent);"></i>
                        <h3>Password Reset</h3>
                        <p>Secure Your Account</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
