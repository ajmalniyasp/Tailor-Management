{% for n in items %}
<li>
  <a
    class="dropdown-item {% if not n.is_read %}fw-bold{% endif %}"
    href="{{ n.url }}"
    data-id="{{ n.auto_id }}"
  >
    {{ n.verb }}
    <small class="text-muted d-block">{{ n.created_at|date:"M d, H:i" }}</small>
  </a>
</li>
{% empty %}
<li class="dropdown-item text-muted">No notifications</li>
{% endfor %}
